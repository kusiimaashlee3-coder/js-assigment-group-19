<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Interactive E-Commerce</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar with cart count (DOM updated by JS) -->
    <nav class="navbar">
        <div>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart</a>
            <a href="checkout.html">Checkout</a>
        </div>
        <div id="cartCount">Cart (0)</div>
    </nav>
    <main>
        
    <h1>Welcome to Our Online Shop</h1>

    <!-- Search bar (JS event listener attached dynamically) -->
    <input type="text" id="search" placeholder="Search products by name...">

    <!-- Filter buttons (onclick events) -->
    <div>
        <button class="filter-btn" onclick="filterProducts('All')">All</button>
        <button class="filter-btn" onclick="filterProducts('Electronics')">Electronics</button>
        <button class="filter-btn" onclick="filterProducts('Fashion')">Fashion</button>
        <button class="filter-btn" onclick="filterProducts('Books')">Books</button>
    </div>

    <!-- Dynamic product list (populated by JS DOM manipulation) -->
    <div id="productList"></div>

    </main>
    <script src="javascript/script.js"></script>
    <footer><p>&copy; 2026.your shopping experience is our delight..ALL RIGHTS RESERVED</p>></footer>
</body>
</html>
